name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: phygital_dining
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d phygital_dining"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/phygital_dining
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/phygital_dining
      STAFF_SESSION_SECRET: playwright-ci-session-secret
      ALLOW_INSECURE_SEED_PASSWORD: "true"
      GEMINI_API_KEY: ""
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 24
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Apply database migrations
      run: npx prisma migrate deploy
    - name: Seed test data
      run: npm run db:seed
    - name: Build application
      run: npm run build
    - name: Run Playwright tests
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
